#
# Lucid configuration file
#

# The URL of the Postgres database to connect to. This is required.
database_url = "postgres://postgres:postgres@localhost/postgres"

# The bind address and port for the API server to listen on. This is required.
bind_address = "0.0.0.0:8080"

# The server mode to run with.
# Allowed values: prod, dev
server_mode = "dev"

[session]
idle_timeout = "1h"
absolute_timeout = "24h"
