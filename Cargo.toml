[workspace]
resolver = "2"
members = [
  "api",

  "auth",
  "auth/macros",

  "common",
  "common/macros",

  "db",
  "db/macros",
  "db/models",
  "db/schema",

  "types",
  "uuid-kinds",
]

[workspace.package]
edition = "2024"
license = "Apache-2.0"

[workspace.dependencies]
anyhow = "1.0"
async-trait = "0.1"
bb8 = "0.9.1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.5", features = ["cargo", "derive", "env", "wrap_help"] }
config = { version = "0.15.19", features = ["toml"] }
cookie = "0.18.1"
derive-where = "1.6.0"
diesel = { version = "2.3.6", features = ["postgres", "chrono", "serde_json", "uuid"] }
diesel-derive-enum = { version = "3.0.0-beta.1", features = ["postgres"] }
diesel_migrations = { version = "2.3.1" }
diesel-async = { version = "0.7.0", features = ["postgres", "bb8"] }
dropshot = "0.16"
dropshot-api-manager = "0.2"
dropshot-api-manager-types = "0.2"
http = "1.3.1"
httptest = "0.16.3"
futures = "0.3.31"
newtype_derive = "0.1.6"
newtype-uuid = { version = "1.3.2", features = ["serde", "schemars08", "v4"] }
newtype-uuid-macros = "0.1.0"
parse-display = "0.10.0"
proc-macro2 = "1.0"
quote = "1.0"
oso = "0.27.3"
schemars = { version = "0.8", features = ["chrono", "uuid1"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.145"
serde_tokenstream = "0.2.2"
serde_with = "3.16.1"
slog = "2.8.2"
slog-async = "2.8.0"
syn = "2.0"
tap = "1.0.1"
thiserror = "2.0.18"
tokio = "1.47.0"
tracing = "0.1.44"
tracing-appender = "0.2.4"
tracing-logfmt = "0.3.7"
tracing-slog = { git = "https://github.com/oxidecomputer/tracing-slog", default-features = false }
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "json"] }
uuid = { version = "1.17.0", features = ["serde", "v4"] }
heck = "0.5"

# lucid monorepo
lucid-auth = { path = "auth" }
lucid-auth-macros = { path = "auth/macros" }

lucid-common = { path = "common" }
lucid-macros-common = { path = "common/macros" }

lucid-db = { path = "db" }
lucid-db-macros = { path = "db/macros" }
lucid-db-models = { path = "db/models" }
lucid-db-schema = { path = "db/schema" }

lucid-types = { path = "types" }
lucid-uuid-kinds = { path = "uuid-kinds" }
