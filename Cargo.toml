[workspace]
resolver = "2"
members = ["api","common",
  "db",
  "db/models",
  "db/schema",
]

[workspace.package]
edition = "2024"
license = "Apache-2.0"

[workspace.dependencies]
anyhow = "1.0"
async-bb8-diesel = "0.2"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.5", features = ["cargo", "derive", "env", "wrap_help"] }
config = { version = "0.15.19", features = ["toml"] }
diesel = { version = "2.3.6", features = ["postgres", "chrono", "serde_json", "uuid"] }
diesel_migrations = { version = "2.3.1" }
dropshot = "0.16"
dropshot-api-manager = "0.2"
dropshot-api-manager-types = "0.2"
http = "1.3.1"
httptest = "0.16.3"
newtype-uuid = { version = "1.3.2", features = ["serde", "schemars08", "v4"] }
newtype-uuid-macros = "0.1.0"
schemars = "0.8.22"
serde = { version = "1.0", features = [ "derive" ] }
serde_json = "1.0.145"
slog = "2.8.2"
slog-async = "2.8.0"
thiserror = "2.0.18"
tokio = "1.47.0"
tap = "1.0.1"
tracing = "0.1.44"
tracing-appender = "0.2.4"
tracing-logfmt = "0.3.7"
tracing-slog = { git = "https://github.com/oxidecomputer/tracing-slog", default-features = false }
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "json"] }
uuid = { version = "1.17.0", features = ["serde", "v4"] }

# lucid monorepo
lucid-db = { path = "db" }
lucid-db-models = { path = "db/models" }
lucid-db-schema = { path = "db/schema" }
